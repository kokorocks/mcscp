<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Owner Panel</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            padding:25px;
            background:#0f1115;
            color:white;
            font-family:Arial, sans-serif;
        }

        h1{
            margin-top:0;
            margin-bottom:25px;
        }

        .section{
            margin-bottom:45px;
        }

        .table-wrapper{
            overflow-x:auto;
            border-radius:12px;
            border:1px solid #2a2d35;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#171a21;
        }

        th{
            background:#1f2430;
            text-align:left;
            padding:14px;
            font-size:14px;
            border-bottom:1px solid #2a2d35;
        }

        td{
            padding:14px;
            border-bottom:1px solid #2a2d35;
            font-size:14px;
        }

        tr:hover{
            background:#1c2029;
        }

        .badge{
            padding:5px 10px;
            border-radius:999px;
            font-size:12px;
            font-weight:bold;
            display:inline-block;
        }

        .accepted{
            background:rgba(0,255,100,0.15);
            color:#58ff93;
        }

        .pending{
            background:rgba(255,180,0,0.15);
            color:#ffc14d;
        }

        button{
            border:none;
            border-radius:8px;
            padding:8px 12px;
            cursor:pointer;
            font-weight:bold;
            margin-right:6px;
        }

        .accept-btn{
            background:#39d353;
            color:black;
        }

        .deny-btn{
            background:#ff4d4d;
            color:white;
        }

        .save-btn{
            background:#4da3ff;
            color:white;
        }

        select{
            padding:8px;
            border-radius:8px;
            border:1px solid #333;
            background:#111;
            color:white;
        }

        .empty{
            padding:20px;
            text-align:center;
            color:#999;
        }

    </style>
</head>
<body>

    <h1>Owner Control Panel</h1>

    <div class="section">

        <h2>Pending Users</h2>

        <div class="table-wrapper">
            <table>

                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="pending-body"></tbody>

            </table>
        </div>

    </div>

    <div class="section">

        <h2>Accepted Users</h2>

        <div class="table-wrapper">
            <table>

                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Allowed Servers</th>
                        <th>Save Role</th>
                    </tr>
                </thead>

                <tbody id="accepted-body"></tbody>

            </table>
        </div>

    </div>

    <script>

        const API = window.location.origin;

        let users = [];

        async function loadUsers(){

            const res = await fetch(API + "/verify-users", {
                credentials:"include"
            });

            users = await res.json();

            renderUsers();
        }

        function renderUsers(){

            const pendingBody =
                document.getElementById("pending-body");

            const acceptedBody =
                document.getElementById("accepted-body");

            pendingBody.innerHTML = "";
            acceptedBody.innerHTML = "";

            const pending =
                users.filter(u => !u.accepted);

            const accepted =
                users.filter(u => u.accepted);

            if(pending.length === 0){

                pendingBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty">
                            No pending users
                        </td>
                    </tr>
                `;
            }

            if(accepted.length === 0){

                acceptedBody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty">
                            No accepted users
                        </td>
                    </tr>
                `;
            }

            pending.forEach(user => {

                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${user.username}</td>

                    <td>${user.email}</td>

                    <td>${user.role}</td>

                    <td>
                        <span class="badge pending">
                            Pending
                        </span>
                    </td>

                    <td>

                        <button
                            class="accept-btn"
                            onclick="acceptUser('${user.username}')">

                            Accept

                        </button>

                        <button
                            class="deny-btn"
                            onclick="denyUser('${user.username}')">

                            Deny

                        </button>

                    </td>
                `;

                pendingBody.appendChild(row);

            });

            accepted.forEach(user => {

                const row = document.createElement("tr");

                row.innerHTML = `
                            
                    <td>
                    
                        <div style="
                            display:flex;
                            align-items:center;
                            gap:12px;
                        ">
                    
                            <img
                                src="https://minotar.net/avatar/${user.username}/50.png"
                                alt="${user.username}'s Minecraft Head"
                                style="
                                    width:50px;
                                    height:50px;
                                    border-radius:8px;
                                    image-rendering:pixelated;
                                    border:1px solid #333;
                                    background:#111;
                                "
                            >
                    
                            <div>
                            
                                <div style="
                                    font-weight:bold;
                                    font-size:15px;
                                ">
                                    ${user.username}
                                </div>
                            
                                <div style="
                                    font-size:12px;
                                    color:#999;
                                    margin-top:3px;
                                ">
                                    Minecraft User
                                </div>
                            
                            </div>
                        
                        </div>
                    
                    </td>
                
                    <td>${user.email}</td>
                
                    <td>
                    
                        <select id="role-${user.username}">
                        
                            <option
                                value="user"
                                ${user.role === "user" ? "selected" : ""}>
                                User
                            </option>
                        
                            <option
                                value="owner"
                                ${user.role === "owner" ? "selected" : ""}>
                                Owner
                            </option>
                        
                            <option
                                value="admin"
                                ${user.role === "admin" ? "selected" : ""}>
                                Admin
                            </option>
                        
                        </select>
                    
                    </td>
                
                    <td>
                        <span class="badge accepted">
                            Accepted
                        </span>
                    </td>
                
                    <td>
                        ${
                            user.allowed_servers.length
                            ?
                            user.allowed_servers.join(", ")
                            :
                            "None"
                        }
                    </td>
                
                    <td>
                    
                        <button
                            class="save-btn"
                            onclick="saveRole('${user.username}')">
                    
                            Save
                    
                        </button>
                    
                    </td>
                `;

                acceptedBody.appendChild(row);

            });

        }

        async function acceptUser(username){

            const res = await fetch(API + "/accept-user", {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify({
                    username
                })

            });

            const data = await res.json();

            alert(data.message || "Accepted");

            loadUsers();
        }

        async function denyUser(username){

            const res = await fetch(API + "/deny-user", {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify({
                    username
                })

            });

            const data = await res.json();

            alert(data.message || "Denied");

            loadUsers();
        }

        async function saveRole(username){

            const role =
                document.getElementById(
                    `role-${username}`
                ).value;

            const res = await fetch(API + "/set-role", {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify({
                    username,
                    role
                })

            });

            const data = await res.json();

            alert(data.message || "Role updated");

            loadUsers();
        }

        loadUsers();

    </script>

</body>
</html>
